<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - Sistema de Seguridad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <!-- ✅ Script de Google reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h2>Sistema de Seguridad</h2>
            <p>Inicie sesión para continuar</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Usuario</label>
                <input type="text" class="form-control" id="username" required autocomplete="username">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" required autocomplete="current-password">
            </div>

            <!-- ✅ Google reCAPTCHA v2 "No soy un robot" -->
            <div class="mb-3">
                <div class="g-recaptcha" data-sitekey="6Lcj3ossAAAAAKzrnGoFf6vQX13bqRte9ngFLxUS"></div>
                <div id="captchaError" class="text-danger small mt-1" style="display:none;">
                    Por favor, completa el reCAPTCHA
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
        </form>

        <div class="text-center mt-3">
            <small class="text-muted">Sistema de Gestión de Seguridad</small>
        </div>
    </div>
</div>

<link rel="stylesheet" href="/static/css/styles.css">
<script src="/static/js/login.js"></script>
</body>
</html>
