<div class="card">
    <div class="card-header">
        <h3>Gestión de Permisos por Perfil</h3>
    </div>
    <div class="card-body">
        <div class="mb-3">
            <button id="btnNuevoPermiso" class="btn btn-primary" onclick="window.permisosPerfilModule.showCreateModal()">
                <i class="fas fa-plus"></i> Configurar Permisos
            </button>
        </div>

        <!-- Filtro por perfil -->
        <div class="mb-3 row align-items-end">
            <div class="col-md-4">
                <label class="form-label">Filtrar por Perfil</label>
                <select class="form-control" id="filtroPerfil" onchange="window.permisosPerfilModule.filtrarPorPerfil()">
                    <option value="">Todos los perfiles</option>
                </select>
            </div>
        </div>

        <div class="table-container">
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>Perfil</th>
                        <th>Módulo</th>
                        <th>Agregar</th>
                        <th>Editar</th>
                        <th>Consultar</th>
                        <th>Eliminar</th>
                        <th>Detalle</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="permisosTableBody">
                    <tr><td colspan="8" class="text-center">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination-container">
                <nav><ul class="pagination" id="pagination"></ul></nav>
            </div>
        </div>
    </div>
</div>

<!-- Modal configurar permisos por perfil -->
<div class="modal fade" id="permisosModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="permisosModalTitle">Configurar Permisos</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="permisosPerfil" class="form-label fw-bold">Perfil *</label>
                    <select class="form-control" id="permisosPerfil" onchange="window.permisosPerfilModule.onPerfilChange()" required>
                        <option value="">Seleccione un perfil</option>
                    </select>
                </div>

                <div id="modulosContainer" style="display:none;">
                    <hr>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="fw-bold mb-0">Módulos y Permisos</h6>
                        <div>
                            <button type="button" class="btn btn-sm btn-outline-success me-1"
                                    onclick="window.permisosPerfilModule.marcarTodos(true)">
                                <i class="fas fa-check-double"></i> Marcar todos
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-danger"
                                    onclick="window.permisosPerfilModule.marcarTodos(false)">
                                <i class="fas fa-times"></i> Desmarcar todos
                            </button>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-sm">
                            <thead class="table-dark">
                            <tr>
                                <th>Módulo</th>
                                <th class="text-center">Visible</th>
                                <th class="text-center">Agregar</th>
                                <th class="text-center">Editar</th>
                                <th class="text-center">Consultar</th>
                                <th class="text-center">Eliminar</th>
                                <th class="text-center">Detalle</th>
                            </tr>
                            </thead>
                            <tbody id="modulosPermisosBody">
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="modulosLoading" style="display:none;" class="text-center py-3">
                    <div class="spinner-border spinner-border-sm"></div> Cargando módulos...
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="window.permisosPerfilModule.savePermisos()">
                    <i class="fas fa-save"></i> Guardar Permisos
                </button>
            </div>
        </div>
    </div>
</div>
