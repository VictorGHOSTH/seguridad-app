<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard - Sistema de Seguridad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="dashboard-wrapper">
    <nav class="sidebar">
        <div class="p-3">
            <h4 class="text-center">Sistema Seguridad</h4>
            <hr>
            <ul class="nav flex-column" id="menusContainer"></ul>
        </div>
    </nav>

    <div class="main-content">
        <nav class="top-navbar">
            <button class="btn btn-outline-secondary d-md-none" id="toggleSidebar">
                <i class="fas fa-bars"></i>
            </button>
            <div class="user-info" id="userInfo"></div>
            <button class="btn btn-outline-danger" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </nav>

        <div class="content-area">
            <div class="breadcrumb-area" id="breadcrumbs"></div>
            <div id="contentContainer">
                <div class="text-center py-5">
                    <h3 style="color: var(--bg-dark);">Bienvenido al Sistema de Seguridad</h3>
                    <p style="color: var(--bg-light);">Seleccione un módulo del menú para comenzar</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/dashboard.js"></script>
<script src="/static/js/perfil.js"></script>
<script src="/static/js/usuario.js"></script>
<script src="/static/js/modulo.js"></script>
<script src="/static/js/permisos-perfil.js"></script>
</body>
</html>
