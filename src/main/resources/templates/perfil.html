<div class="card">
    <div class="card-header">
        <h3>Gestión de Perfiles</h3>
    </div>
    <div class="card-body">
        <div class="mb-3">
            <button class="btn btn-primary" onclick="window.perfilModule.showCreateModal()">
                <i class="fas fa-plus"></i> Nuevo Perfil
            </button>
        </div>

        <div class="table-container">
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Administrador</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="perfilTableBody">
                    <tr>
                        <td colspan="4" class="text-center">Cargando...</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination-container">
                <nav>
                    <ul class="pagination" id="pagination">
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="perfilModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="perfilModalTitle">Crear Perfil</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="perfilForm">
                    <input type="hidden" id="perfilId">
                    <div class="mb-3">
                        <label for="perfilNombre" class="form-label">Nombre del Perfil *</label>
                        <input type="text" class="form-control" id="perfilNombre" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="perfilAdministrador">
                        <label class="form-check-label" for="perfilAdministrador">Administrador</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="window.perfilModule.savePerfil()">Guardar</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="perfilDetailModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Detalle del Perfil</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <strong>ID:</strong> <span id="detailId"></span>
                </div>
                <div class="mb-3">
                    <strong>Nombre:</strong> <span id="detailNombre"></span>
                </div>
                <div class="mb-3">
                    <strong>Administrador:</strong> <span id="detailAdministrador"></span>
                </div>
            </div>
        </div>
    </div>
</div>
